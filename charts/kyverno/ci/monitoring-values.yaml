---
admissionController:
  serviceMonitor:
    enabled: true
    relabelings:
    - action: labeldrop
      regex: container

cleanupController:
  serviceMonitor:
    enabled: true
    relabelings:
    - action: labeldrop
      regex: container

backgroundController:
  serviceMonitor:
    enabled: true
    relabelings:
    - action: labeldrop
      regex: container

reportsController:
  serviceMonitor:
    enabled: true
    relabelings:
    - action: labeldrop
      regex: container

grafana:
  enabled: true

prometheusRule:
  enabled: true
  additionalLabels:
    release: prometheus
  spec:
    - name: kyverno.admission
      rules:
        - alert: KyvernoAdmissionHighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(kyverno_admission_review_duration_seconds_bucket[5m])) by (le)
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Kyverno admission review p99 latency is elevated
