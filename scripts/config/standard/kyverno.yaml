features:
  policyExceptions:
    enabled: true
    namespace: "*"
  omitEvents:
    eventTypes: []

admissionController:
  extraArgs:
    v: 4
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - "*"
          resources:
            - secrets
          verbs:
            - create
            - update
            - patch
            - delete
            - get
            - list
  tracing:
    # enable tracing
    enabled: true
    # jaeger backend url
    address: jaeger-collector.monitoring
    # jaeger backend port for opentelemetry traces
    port: 4317

backgroundController:
  extraArgs:
    v: 4
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - "*"
          resources:
            - configmaps
            - networkpolicies
            - resourcequotas
            - secrets
            - roles
            - rolebindings
            - limitranges
            - namespaces
            - nodes
            - nodes/status
            - pods
          verbs:
            - create
            - update
            - patch
            - delete
            - get
            - list

cleanupController:
  rbac:
    clusterRole:
      extraResources:
        - apiGroups:
            - ""
          resources:
            - pods
          verbs:
            - list
            - delete
