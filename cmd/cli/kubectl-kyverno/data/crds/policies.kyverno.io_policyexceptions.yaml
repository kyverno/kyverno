  - name: v1
    schema:
      openAPIV3Schema:
        description: PolicyException declares resources to be excluded from specified
          policies.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec declares policy exception behaviors.
            properties:
              allowedValues:
                description: |-
                  AllowedValues specifies values that can be used in CEL expressions to bypass policy checks.
                  These values can be referenced in CEL expressions via `exceptions.allowedValues`.
                items:
                  type: string
                type: array
              evaluationMode:
                description: Evaluation mode denotes which controller is in charge
                  of compiling and handling this exception.
                type: string
              expiresAt:
                description: |-
                  ExpiresAt specifies the time when the policy exception expires.
                  Once expired, the exception will no longer be applied to incoming requests.
                  The expected format is RFC3339 date-time (for example "2026-05-01T00:00:00Z").
                format: date-time
                type: string
              images:
                description: |-
                  Images specifies container images to be excluded from policy evaluation.
                  These excluded images can be referenced in CEL expressions via `exceptions.allowedImages`.
                items:
                  type: string
                type: array
              matchConditions:
                description: MatchConditions is a list of CEL expressions that must
                  be met for a resource to be excluded.
                items:
                  description: MatchCondition represents a condition which must by
                    fulfilled for a request to be sent to a webhook.
                  properties:
                    expression:
                      description: |-
                        Expression represents the expression which will be evaluated by CEL. Must evaluate to bool.
                        CEL expressions have access to the contents of the AdmissionRequest and Authorizer, organized into CEL variables:

                        'object' - The object from the incoming request. The value is null for DELETE requests.
                        'oldObject' - The existing object. The value is null for CREATE requests.
                        'request' - Attributes of the admission request(/pkg/apis/admission/types.go#AdmissionRequest).
                        'authorizer' - A CEL Authorizer. May be used to perform authorization checks for the principal (user or service account) of the request.
                          See https://pkg.go.dev/k8s.io/apiserver/pkg/cel/library#Authz
                        'authorizer.requestResource' - A CEL ResourceCheck constructed from the 'authorizer' and configured with the
                          request resource.
                        Documentation on CEL: https://kubernetes.io/docs/reference/using-api/cel/

                        Required.
                      type: string
                    name:
                      description: |-
                        Name is an identifier for this match condition, used for strategic merging of MatchConditions,
                        as well as providing an identifier for logging purposes. A good name should be descriptive of
                        the associated expression.
                        Name must be a qualified name consisting of alphanumeric characters, '-', '_' or '.', and
                        must start and end with an alphanumeric character (e.g. 'MyName',  or 'my.name',  or
                        '123-abc', regex used for validation is '([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]') with an
                        optional DNS subdomain prefix and '/' (e.g. 'example.com/MyName')

                        Required.
                      type: string
                  required:
                  - expression
                  - name
                  type: object
                type: array
              policyRefs:
                description: PolicyRefs identifies the policies to which the exception
                  is applied.
                items:
                  properties:
                    kind:
                      description: Kind is the kind of the policy
                      type: string
                    name:
                      description: Name is the name of the policy
                      type: string
                    validationAction:
                      description: ValidationAction overrides the policy's validation
                        action when set
                      type: string
                      enum: [Deny, Audit, Warn]
                  required:
                  - kind
                  - name
                  type: object
                type: array
              properties:
                additionalProperties:
                  type: string
                description: |-
                  Properties is an optional map for additional metadata attached to this exception.
                  For example:
                  - reason: why this exception is needed
                  - ticket: external approval/request identifier
                  - approved-by: comma-separated approver list
                type: object
              reportResult:
                default: skip
                description: |-
                  ReportResult indicates whether the policy exception should be reported in the policy report
                  as a skip result or pass result. Defaults to "skip".
                enum:
                - skip
                - pass
                type: string
            required:
            - policyRefs
            type: object
        required:
        - spec
        type: object
    served: true
    storage: false
