# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: exclude-images
spec:
  concurrent: false
  steps:
  - name: create exception
    try:
    - create:
        file: exception.yaml
    - sleep:
        duration: 10s
  - name: create policy
    use:
      template: ../../../_step-templates/create-policy.yaml
      with:
        bindings:
        - name: file
          value: policy.yaml
  - name: wait-mutating-policy-ready
    use:
      template: ../../../_step-templates/mutating-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: exclude-images
  - name: create good pod
    try:
    - sleep:
        duration: 10s
    - create:
        file: good-pod.yaml
    - assert:
        file: good-pod-assert.yaml
  - name: create skipped-pod
    try:
    - apply:
        file: skipped-pod.yaml
  - name: verify foo label not present on skipped deployment
    try:
    - script:
        content: |
          # Check if foo label is present on skipped-deployment
          FOO_LABEL=$(kubectl get deployment skipped-deployment -o jsonpath='{.metadata.labels.foo}' 2>/dev/null || echo "")
          if [ -n "$FOO_LABEL" ]; then
            echo "ERROR: foo label found on skipped-deployment: $FOO_LABEL"
            exit 1
          else
            echo "SUCCESS: foo label not present on skipped-deployment"
          fi

