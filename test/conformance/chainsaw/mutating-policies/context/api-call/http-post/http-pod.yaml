apiVersion: v1
kind: Pod
metadata:
  namespace: default
  name: test-api
  labels:
    app: test-api
spec:
  containers:
  - name: test-api
    image: python:3.9-slim
    command: ["sh", "-c"]
    args:
    - |
      pip install flask &&
      echo 'from flask import Flask, jsonify
      app = Flask(__name__)
      @app.route("/", methods=["POST"])
      def handle_post():
          data = request.get_json()
          return jsonify({"recieved": data, "metadata": {"labels": {"postLabel": "from-post"}}})
      if __name__ == "__main__":
          app.run(host="0.0.0.0", port=5000)' > app.py &&
      python app.py
    ports:
    - containerPort: 5000
    readinessProbe:
      httpGet:
        path: /
        port: 5000
      initialDelaySeconds: 15
      periodSeconds: 5
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /
        port: 5000
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3 