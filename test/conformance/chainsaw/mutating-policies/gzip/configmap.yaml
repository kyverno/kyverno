apiVersion: v1
kind: ConfigMap
metadata:
  name: initdata-config
  annotations:
    description: |
      This ConfigMap contains base64-gzip encoded initdata for CoCo.
      To update, modify the plaintext TOML below, then:
      echo '<your-toml>' | gzip | base64

      Plaintext initdata example:
      version = "0.1.0"
      algorithm = "sha384"

      [data]
      "policy.rego" = """
      package agent_policy
      default allow = true
      """

      "aa.toml" = """
      [token_configs.kbs]
      url = "https://kbs.example.com:8080"
      """

      "cdh.toml" = """
      [kbc]
      name = "cc_kbc"
      url = "https://kbs.example.com:8080"
      """
