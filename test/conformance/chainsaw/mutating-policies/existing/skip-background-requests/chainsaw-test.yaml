# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: skip-background-requests
spec:
  concurrent: false
  steps:
  - name: grant-background-user-permissions
    try:
    - apply:
        file: permissions.yaml
  - name: create namespace and target configmap
    try:
    - apply:
        file: namespace.yaml
    - apply:
        file: configmap.yaml
  - name: create policy with default background skip
    use:
      template: ..//../../_step-templates/create-policy.yaml
      with:
        bindings:
        - name: file
          value: policy-default.yaml
  - name: wait-mutating-policy-ready-default
    use:
      template: ..//../../_step-templates/mutating-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: mpol-skip-background-default
  - name: wait-webhook-default
    try:
    - sleep:
        duration: 5s
  - name: background-user-updates-namespace-default
    try:
    - script:
        content: |
          kubectl label namespace mpol-skip-background-ns trigger=default --overwrite --as system:serviceaccount:kyverno:kyverno-background-controller
  - name: no-mutation-happens-by-default
    try:
    - script:
        content: |
          value=$(kubectl get configmap target-cm -n mpol-skip-background-ns -o jsonpath='{.metadata.labels.bgmutated}')
          if [ -n "$value" ]; then
            echo "expected no mutation label, got bgmutated=$value"
            exit 1
          fi
  - name: cleanup-default-policy
    try:
    - delete:
        ref:
          apiVersion: policies.kyverno.io/v1
          kind: MutatingPolicy
          name: mpol-skip-background-default
  - name: create policy with background skip disabled
    use:
      template: ..//../../_step-templates/create-policy.yaml
      with:
        bindings:
        - name: file
          value: policy-optin.yaml
  - name: wait-mutating-policy-ready-optin
    use:
      template: ..//../../_step-templates/mutating-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: mpol-skip-background-optin
  - name: wait-webhook-optin
    try:
    - sleep:
        duration: 5s
  - name: background-user-updates-namespace-optin
    try:
    - script:
        content: |
          kubectl label namespace mpol-skip-background-ns trigger=optin --overwrite --as system:serviceaccount:kyverno:kyverno-background-controller
  - name: mutation-happens-when-opted-in
    try:
    - assert:
        file: configmap-mutated-assert.yaml
