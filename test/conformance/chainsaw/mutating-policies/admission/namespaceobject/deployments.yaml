apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deploy
  namespace: namespaceobject
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
      - name: nginx
        image: public.ecr.aws/docker/library/nginx
