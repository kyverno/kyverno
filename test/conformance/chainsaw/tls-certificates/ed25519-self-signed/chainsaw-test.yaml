apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ed25519-self-signed
spec:
  steps:
  # Step 1: Install Kyverno with Ed25519 key algorithm using Helm
  # Uses make target to ensure correct image registry/repository/tag settings
  # Requires ROOT_DIR and HELM environment variables to be set by the workflow
  - name: install-kyverno-ed25519
    try:
    - script:
        timeout: 300s
        content: |
          #!/bin/bash
          set -e
          cd "$ROOT_DIR"
          # Install Kyverno with Ed25519 key algorithm for self-signed certificates
          make kind-install-kyverno EXPLICIT_INSTALL_SETTINGS="--set admissionController.tlsKeyAlgorithm=Ed25519 --set cleanupController.tlsKeyAlgorithm=Ed25519"
          echo "Kyverno installed successfully with Ed25519 self-signed certificates"

  # Step 2: Verify Kyverno is ready
  - name: verify-kyverno-ready
    try:
    - assert:
        timeout: 180s
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kyverno-admission-controller
            namespace: kyverno
          status:
            readyReplicas: 1
    - assert:
        timeout: 180s
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kyverno-cleanup-controller
            namespace: kyverno
          status:
            readyReplicas: 1

  # Step 3: Verify the certificates are Ed25519
  - name: verify-ed25519-certificates
    try:
    - script:
        timeout: 60s
        content: |
          #!/bin/bash
          set -e

          echo "Checking admission controller CA certificate..."
          CA_SECRET="kyverno-svc.kyverno.svc.kyverno-tls-ca"
          CERT=$(kubectl get secret "$CA_SECRET" -n kyverno -o jsonpath='{.data.tls\.crt}' | base64 -d)
          KEY_TYPE=$(echo "$CERT" | openssl x509 -noout -text 2>/dev/null | grep "Public Key Algorithm" | head -1)

          if echo "$KEY_TYPE" | grep -qi "ed25519"; then
            echo "✓ CA certificate uses Ed25519 key algorithm"
          else
            echo "✗ CA certificate does not use Ed25519: $KEY_TYPE"
            exit 1
          fi

          echo "Checking admission controller TLS certificate..."
          TLS_SECRET="kyverno-svc.kyverno.svc.kyverno-tls-pair"
          CERT=$(kubectl get secret "$TLS_SECRET" -n kyverno -o jsonpath='{.data.tls\.crt}' | base64 -d)
          KEY_TYPE=$(echo "$CERT" | openssl x509 -noout -text 2>/dev/null | grep "Public Key Algorithm" | head -1)

          if echo "$KEY_TYPE" | grep -qi "ed25519"; then
            echo "✓ TLS certificate uses Ed25519 key algorithm"
          else
            echo "✗ TLS certificate does not use Ed25519: $KEY_TYPE"
            exit 1
          fi

          echo "All certificates verified as Ed25519"

  # Step 4: Test webhook functionality with a simple policy
  - name: test-webhook-functionality
    try:
    - apply:
        file: 01-test-policy.yaml
    - assert:
        timeout: 60s
        resource:
          apiVersion: kyverno.io/v1
          kind: ClusterPolicy
          metadata:
            name: require-labels-test
          status:
            conditions:
            - type: Ready
              status: "True"
    - script:
        timeout: 30s
        content: |
          #!/bin/bash
          set -e

          # Create a test namespace
          kubectl create namespace test-ed25519-self-signed --dry-run=client -o yaml | kubectl apply -f -

          # Try to create a pod without the required label - should be blocked
          if kubectl run test-pod --image=nginx --restart=Never -n test-ed25519-self-signed 2>&1 | grep -q "blocked"; then
            echo "Policy correctly blocked pod without required label"
          else
            # Check if the pod was created (it shouldn't be in audit mode)
            if kubectl get pod test-pod -n test-ed25519-self-signed 2>/dev/null; then
              echo "Warning: Pod was created - policy may be in audit mode"
            fi
          fi

          # Create a pod with the required label - should succeed
          kubectl run test-pod-with-label --image=nginx --restart=Never \
            --labels="app.kubernetes.io/name=test" -n test-ed25519-self-signed

          echo "Webhook test completed successfully with Ed25519 certificates"
    # Cleanup at the end of this step
    finally:
    - script:
        timeout: 120s
        content: |
          #!/bin/bash
          # Cleanup resources
          kubectl delete namespace test-ed25519-self-signed --ignore-not-found=true
          kubectl delete clusterpolicy require-labels-test --ignore-not-found=true
          helm uninstall kyverno -n kyverno --ignore-not-found || true
          kubectl delete namespace kyverno --ignore-not-found=true
          echo "Cleanup completed"
