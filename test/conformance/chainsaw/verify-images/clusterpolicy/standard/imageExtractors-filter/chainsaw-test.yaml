# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: imageextractors-filter
spec:
  concurrent: false
  steps:
  - name: step-00
    try:
    - apply:
        file: crd.yaml
    - assert:
        file: crd-ready.yaml
  - name: create policy
    use:
      template: ../../../../_step-templates/create-policy.yaml
      with:
        bindings:
        - name: file
          value: policy.yaml
  - name: wait policy ready
    use:
      template: ../../../../_step-templates/cluster-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: taskruns-filter
  - name: step-02 - signed bundle is admitted
    try:
    - apply:
        file: taskrun.yaml
    - assert:
        file: taskrun.yaml
  - name: step-03 - unsigned bundle is rejected
    try:
    - apply:
        expect:
        - check:
            ($error != null): true
        file: badtaskrun.yaml
