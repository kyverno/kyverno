apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sigstore-bundle-static-key-policy
spec:
  background: false
  failurePolicy: Fail
  rules:
  - match:
      any:
      - resources:
          kinds:
          - Pod
    name: verify-sigstore-bundle
    verifyImages:
    - type: SigstoreBundle
      attestors:
      - entries:
        - keys:
            publicKeys: |-
              -----BEGIN PUBLIC KEY-----
              MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE3U/OuBrVdhe36MgxPnI4NjOzoB8G
              +6CFyxUQzJMoIaZKUcAR//ZQsou8R1olIdCwvDrLVWjSLVw+CoJc3ZZpMA==
              -----END PUBLIC KEY-----
            rekor:
              ignoreTlog: true
            ctlog:
              ignoreSCT: true
      imageReferences:
      - "quay.io/arewm/tekton-tasks*"
      mutateDigest: false
      verifyDigest: true
      failureAction: Enforce
  webhookTimeoutSeconds: 30
