# Minimal JSON echo server used as the test HTTP endpoint.
# Returns {"status":"ok"} so that http.get() in CEL resolves to a map with
# a statusCode field (added by the SDK's http library).
apiVersion: v1
kind: Pod
metadata:
  name: json-server
  namespace: test-cel-http
  labels:
    app: json-server
spec:
  automountServiceAccountToken: false
  containers:
  - name: server
    image: public.ecr.aws/docker/library/python:3.9-slim
    command: [python3, -c]
    args:
    - |
      import http.server, json
      class H(http.server.BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.end_headers()
              self.wfile.write(json.dumps({'status': 'ok'}).encode())
          def log_message(self, *a): pass
      http.server.HTTPServer(('', 8080), H).serve_forever()
    ports:
    - containerPort: 8080
    readinessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 1
      periodSeconds: 2
      failureThreshold: 15
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  terminationGracePeriodSeconds: 0
---
apiVersion: v1
kind: Service
metadata:
  name: json-server
  namespace: test-cel-http
spec:
  selector:
    app: json-server
  ports:
  - port: 8080
    targetPort: 8080
