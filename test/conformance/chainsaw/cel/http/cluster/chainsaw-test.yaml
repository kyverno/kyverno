# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
#
# Combined test for CEL http.get() in cluster-scoped ValidatingPolicies.
# Mirrors the namespaced test structure to contrast the flag behaviour.
#
# Phase 1  – allowHTTPInNamespacedPolicies=false (default), default SSRF blocklist
#   The http.* CEL library IS registered for cluster-scoped policies regardless
#   of the flag. The policy compiles and is active. The default SSRF blocklist
#   covers 10.0.0.0/8 so http.get() is blocked at the transport level and
#   ConfigMap creation is denied with "blocked".
#   Contrast with the namespaced test where Phase 1 succeeds (policy not compiled).
#
# Phase 2  – flag enabled, default SSRF blocklist still active
#   The admission controller is patched to enable the flag. Behaviour is
#   identical to Phase 1: ConfigMap is still denied with "blocked". This proves
#   the flag has no effect on cluster-scoped policies.
#
# Phase 3  – flag enabled, blocklist cleared (httpBlocklist=)
#   The admission controller is patched again to clear the blocklist. The
#   http.get() call reaches the json-server and ConfigMap creation is denied
#   with "statusCode=200", proving end-to-end http access works.
#
#   Both patching steps have cleanup blocks that revert the deployment to a
#   clean state regardless of pass/fail.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cel-http-cluster
spec:
  concurrent: false
  steps:
  - name: create-namespace
    try:
    - create:
        file: namespace.yaml

  - name: create-json-server
    try:
    - create:
        file: json-server.yaml
    - assert:
        timeout: 90s
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            name: json-server
            namespace: test-cel-http-cluster
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
              type: Ready

  - name: apply-policy
    try:
    - create:
        file: policy.yaml

  # Wait for the policy to be compiled and installed in the webhook.
  # The policy must be ready WITHOUT the flag, proving cluster-scoped policies
  # always get http.* registered.
  - name: wait-for-policy-ready
    use:
      template: ../../../_step-templates/validating-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: vpol-cel-http-probe

  # Phase 1: flag=false (default), SSRF blocklist active.
  # The policy is active even without the flag. ConfigMap creation is denied
  # because http.get() is blocked by the SSRF blocklist (not because of missing http.*).
  - name: phase-1-policy-active-without-flag
    timeouts:
      apply: 60s
    try:
    - create:
        resource:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cm-phase1
            namespace: test-cel-http-cluster
          data:
            key: value
        expect:
        - check:
            ($error != null): true
            (contains($error, 'blocked')): true
            (contains($error, 'statusCode=200')): false

  # Enable the flag to prove it has no effect on cluster-scoped policies.
  # The cleanup block reverts the deployment to its original args.
  - name: enable-allow-http-in-namespaced-policies
    try:
    - script:
        timeout: 3m
        content: |
          set -e
          kubectl get deployment kyverno-admission-controller -n kyverno \
            -o 'go-template=[{{ range $i, $a := (index .spec.template.spec.containers 0).args }}{{ if $i }},{{ end }}"{{ $a }}"{{ end }}]' \
            > /tmp/kyverno-original-args-cluster.json
          kubectl patch deployment kyverno-admission-controller -n kyverno \
            --type=json \
            --patch='[
              {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--allowHTTPInNamespacedPolicies=true"}
            ]'
          kubectl rollout status deployment/kyverno-admission-controller \
            -n kyverno --timeout=120s
    cleanup:
    - script:
        timeout: 3m
        content: |
          set -e
          ORIGINAL=$(cat /tmp/kyverno-original-args-cluster.json)
          kubectl patch deployment kyverno-admission-controller -n kyverno \
            --type=json \
            --patch="[{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/args\",\"value\":$ORIGINAL}]"
          kubectl rollout status deployment/kyverno-admission-controller \
            -n kyverno --timeout=120s

  # Wait for policy to still be ready after the flag change (no recompile expected).
  - name: wait-for-policy-still-ready
    use:
      template: ../../../_step-templates/validating-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: vpol-cel-http-probe

  # Phase 2: flag=true, SSRF blocklist still active.
  # Behaviour is identical to Phase 1 – the flag has no effect on cluster-scoped
  # policies. ConfigMap is still denied with "blocked".
  - name: phase-2-flag-has-no-effect
    timeouts:
      apply: 60s
    try:
    - create:
        resource:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cm-phase2
            namespace: test-cel-http-cluster
          data:
            key: value
        expect:
        - check:
            ($error != null): true
            (contains($error, 'blocked')): true
            (contains($error, 'statusCode=200')): false

  # Clear the SSRF blocklist so the in-cluster json-server (10.x.x.x) is reachable.
  # The cleanup block removes --httpBlocklist= from the deployment args.
  - name: enable-empty-blocklist
    try:
    - script:
        timeout: 3m
        content: |
          set -e
          kubectl patch deployment kyverno-admission-controller -n kyverno \
            --type=json \
            --patch='[
              {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--httpBlocklist="}
            ]'
          kubectl rollout status deployment/kyverno-admission-controller \
            -n kyverno --timeout=120s
    cleanup:
    - script:
        timeout: 3m
        content: |
          set -e
          ARGS=$(kubectl get deployment kyverno-admission-controller -n kyverno \
            -o 'go-template=[{{ range $i, $a := (index .spec.template.spec.containers 0).args }}{{ if $i }},{{ end }}"{{ $a }}"{{ end }}]')
          FILTERED=$(echo "$ARGS" | python3 -c "
          import json, sys
          args = json.load(sys.stdin)
          print(json.dumps([a for a in args if not a.startswith('--httpBlocklist=')]))
          ")
          kubectl patch deployment kyverno-admission-controller -n kyverno \
            --type=json \
            --patch="[{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/args\",\"value\":$FILTERED}]"
          kubectl rollout status deployment/kyverno-admission-controller \
            -n kyverno --timeout=120s

  # Wait for the policy to recompile with the cleared blocklist.
  - name: wait-for-policy-ready-without-blocklist
    use:
      template: ../../../_step-templates/validating-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: vpol-cel-http-probe

  # Phase 3: blocklist cleared – http.get() reaches the json-server.
  # The denial message must contain "statusCode=200" proving the http call succeeded.
  - name: phase-3-http-call-succeeds
    timeouts:
      apply: 60s
    try:
    - create:
        resource:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cm-phase3
            namespace: test-cel-http-cluster
          data:
            key: value
        expect:
        - check:
            ($error != null): true
            (contains($error, 'cel-http-test')): true
            (contains($error, 'statusCode=200')): true
