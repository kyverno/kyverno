# ValidatingPolicy (cluster-scoped) that calls http.get() against the in-cluster
# json-server and unconditionally denies admission.
#
# Unlike NamespacedValidatingPolicy, cluster-scoped policies always have the
# http.* CEL library registered regardless of --allowHTTPInNamespacedPolicies.
# This test verifies that behaviour.
apiVersion: policies.kyverno.io/v1beta1
kind: ValidatingPolicy
metadata:
  name: vpol-cel-http-probe
spec:
  validationActions:
  - Deny
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: [v1]
      operations: [CREATE]
      resources: [configmaps]
  variables:
  - name: probe
    expression: >-
      http.get("http://json-server.test-cel-http-cluster.svc.cluster.local:8080/")
  validations:
  - expression: "false"
    messageExpression: >-
      'cel-http-test: statusCode=' + string(variables.probe.statusCode)
