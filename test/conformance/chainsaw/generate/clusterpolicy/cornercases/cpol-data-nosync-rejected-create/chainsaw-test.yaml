# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cpol-data-nosync-rejected-create
spec:
  concurrent: false
  steps:
  - name: step-01
    try:
    - apply:
        file: permissions.yaml
    - apply:
        file: setup-ns.yaml
  - name: step-02
    try:
    - apply:
        file: policy.yaml
  - name: wait policy ready
    use:
      template: ../../../../_step-templates/cluster-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: cpol-rejected-create
  - name: step-03
    try:
    - apply:
        file: ur.yaml
  - name: step-04
    try:
    - sleep:
        duration: 10s
  - name: step-05
    try:
    - assert:
        file: ur-failed.yaml
  - name: step-06
    try:
    - error:
        file: downstream-not-created.yaml
