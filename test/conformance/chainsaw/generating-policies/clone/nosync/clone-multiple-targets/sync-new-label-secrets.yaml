apiVersion: policies.kyverno.io/v1beta1
kind: GeneratingPolicy
metadata:
  annotations:
    policies.kyverno.io/category: resource-generation
    policies.kyverno.io/description: "When a Secret with label 'label-key: label-value' is created in the origin-namespace, this policy clones all such labeled Secrets from origin-namespace into every Namespace that also carries the label 'label-key: label-value'. Synchronization is enabled so downstream Secrets stay up to date."
    policies.kyverno.io/minversion: 1.17.0
    policies.kyverno.io/severity: medium
    policies.kyverno.io/title: Sync Labeled Secrets to Labeled Namespaces
  name: sync-new-label-secrets
spec:
  evaluation:
    synchronize:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - secrets
  matchConditions:
    - name: has-label-key-value
      expression: "object.metadata.?labels[?'label-key'].orValue('') == 'label-value'"
    - name: in-origin-namespace
      expression: "object.metadata.namespace == 'origin-namespace'"
  variables:
    - name: source
      expression: >-
        resource.get("v1", "secrets", object.metadata.namespace, object.metadata.name)
    - name: namespaces
      expression: >-
        resource.List("v1", "namespaces", "")
    - name: targetNamespaces
      expression: >-
        dyn(variables.namespaces.?items.orValue(variables.namespaces))
          .map(ns, ns.?metadata.?name.orValue(string(ns)))
          .filter(ns,
            ns != "origin-namespace" &&
            resource.get("v1", "namespaces", "", ns).?metadata.?labels[?'label-key'].orValue("") == "label-value"
          )
  generate:
    - expression: >-
        variables.targetNamespaces.all(ns, generator.apply(ns, [variables.source]))
