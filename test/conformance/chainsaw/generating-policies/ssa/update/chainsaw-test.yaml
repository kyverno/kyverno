# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ssa-generate-cm-update
spec:
  concurrent: false
  steps:
  - name: create policy
    use:
      template: ../../../_step-templates/create-policy.yaml
      with:
        bindings:
        - name: file
          value: policy.yaml
  - name: wait-generating-policy-ready
    use:
      template: ../../../_step-templates/generating-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: ssa-generate-cm-update
  - name: create namespace
    try:
    - apply:
        file: namespace.yaml
  - name: check configmap is generated
    try:
    - assert:
        file: configmap-assert.yaml
  - name: drift the configmap data via patch
    try:
    - patch:
        resource:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: ssa-update-config
            namespace: ssa-update-ns
            annotations:
              other-controller-managed: "true"
          data:
            key: drifted
  - name: verify external annotation exists before reconcile
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: ssa-update-config
            namespace: ssa-update-ns
            annotations:
              other-controller-managed: "true"
          data:
            mode: ssa
            key: drifted
  - name: trigger policy re-evaluation by updating the namespace
    try:
    - patch:
        resource:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ssa-update-ns
            labels:
              trigger-update: "1"
  - name: check that ssa update restored the original value
    try:
    - assert:
        file: configmap-preserved-assert.yaml
