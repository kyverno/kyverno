# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: forged-verification-annotation
spec:
  description: >-
    A forged kyverno.io/image-verification-outcomes annotation claiming a
    prior "pass" result must not let an unsigned image bypass the deny
    decision: the policy is expected to re-verify the image and still deny
    the request.
  concurrent: false
  steps:
  - name: create policy
    use:
      template: ../../../_step-templates/create-policy.yaml
      with:
        bindings:
        - name: file
          value: policy.yaml
  - name: wait-validating-policy-ready
    use:
      template: ../../../_step-templates/image-validating-policy-ready.yaml
      with:
        bindings:
        - name: name
          value: check-signed-images-forged-annotation
  - name: create pod with forged verification-outcomes annotation
    try:
    - create:
        file: pod.yaml
        expect:
          - check:
              ($error): >-
                admission webhook "ivpol.validate.kyverno.svc-fail" denied the request: Policy check-signed-images-forged-annotation failed: failed to verify image with notary cert
