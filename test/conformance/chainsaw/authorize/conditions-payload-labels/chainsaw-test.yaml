# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: authorizingpolicy-conditions-payload-labels
spec:
  concurrent: false
  steps:
  - name: ensure-authorizingpolicy-crd
    try:
    - script:
        timeout: 1m
        content: |
          set -eu
          kubectl get crd authorizingpolicies.policies.kyverno.io >/dev/null 2>&1 || kubectl apply -f crd.yaml

  - name: create-test-namespace-and-policy
    try:
    - apply:
        file: namespace.yaml
    - apply:
        file: policy.yaml
    - assert:
        resource:
          apiVersion: policies.kyverno.io/v1alpha1
          kind: AuthorizingPolicy
          metadata:
            name: conditions-payload-labels
          status:
            conditionStatus:
              ready: true

  - name: conditionsreview-object-label-prod-allow
    try:
    - script:
        timeout: 2m
        content: |
          set -eu
          kubectl -n kyverno port-forward svc/kyverno-svc 9451:443 >/tmp/authorize-conditions-payload-prod.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID >/dev/null 2>&1 || true' EXIT
          sleep 5
          curl -sk https://127.0.0.1:9451/authz/conditions \
            -H 'Content-Type: application/json' \
            --data-binary @- <<'EOF'
          {
            "apiVersion": "authorization.k8s.io/v1alpha1",
            "kind": "AuthorizationConditionsReview",
            "request": {
              "conditionSetChain": [
                {
                  "authorizerName": "kyverno",
                  "conditionsType": "k8s.io/cel",
                  "conditions": [
                    {
                      "id": "allow-prod",
                      "effect": "Allow",
                      "condition": "request.resourceLabels['env'] == 'prod'"
                    },
                    {
                      "id": "deny-non-prod",
                      "effect": "Deny",
                      "condition": "request.resourceLabels['env'] != 'prod'"
                    }
                  ]
                }
              ],
              "spec": {
                "user": "alice",
                "groups": ["developers"],
                "resourceAttributes": {
                  "verb": "update",
                  "resource": "deployments",
                  "namespace": "authorize-test"
                }
              },
              "object": {
                "apiVersion": "apps/v1",
                "kind": "Deployment",
                "metadata": {
                  "name": "api",
                  "namespace": "authorize-test",
                  "labels": {
                    "env": "prod"
                  }
                }
              }
            }
          }
          EOF
        check:
          (contains($stdout, '"response"')): true
          (contains($stdout, '"allowed":true')): true

  - name: conditionsreview-object-label-nonprod-deny
    try:
    - script:
        timeout: 2m
        content: |
          set -eu
          kubectl -n kyverno port-forward svc/kyverno-svc 9452:443 >/tmp/authorize-conditions-payload-dev.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID >/dev/null 2>&1 || true' EXIT
          sleep 5
          curl -sk https://127.0.0.1:9452/authz/conditions \
            -H 'Content-Type: application/json' \
            --data-binary @- <<'EOF'
          {
            "apiVersion": "authorization.k8s.io/v1alpha1",
            "kind": "AuthorizationConditionsReview",
            "request": {
              "conditionSetChain": [
                {
                  "authorizerName": "kyverno",
                  "conditionsType": "k8s.io/cel",
                  "conditions": [
                    {
                      "id": "allow-prod",
                      "effect": "Allow",
                      "condition": "request.resourceLabels['env'] == 'prod'"
                    },
                    {
                      "id": "deny-non-prod",
                      "effect": "Deny",
                      "condition": "request.resourceLabels['env'] != 'prod'"
                    }
                  ]
                }
              ],
              "spec": {
                "user": "alice",
                "groups": ["developers"],
                "resourceAttributes": {
                  "verb": "update",
                  "resource": "deployments",
                  "namespace": "authorize-test"
                }
              },
              "object": {
                "apiVersion": "apps/v1",
                "kind": "Deployment",
                "metadata": {
                  "name": "api",
                  "namespace": "authorize-test",
                  "labels": {
                    "env": "dev"
                  }
                }
              }
            }
          }
          EOF
        check:
          (contains($stdout, '"response"')): true
          (contains($stdout, '"denied":true')): true
