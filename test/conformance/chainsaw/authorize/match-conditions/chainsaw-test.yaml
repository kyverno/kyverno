# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: authorizingpolicy-match-conditions
spec:
  concurrent: false
  steps:
  - name: ensure-authorizingpolicy-crd
    try:
    - script:
        timeout: 1m
        content: |
          set -eu
          kubectl get crd authorizingpolicies.policies.kyverno.io >/dev/null 2>&1 || kubectl apply -f crd.yaml

  - name: create-test-namespace-and-policy
    try:
    - apply:
        file: namespace.yaml
    - apply:
        file: policy.yaml
    - assert:
        resource:
          apiVersion: policies.kyverno.io/v1alpha1
          kind: AuthorizingPolicy
          metadata:
            name: match-gated-policy
          status:
            conditionStatus:
              ready: true

  - name: policy-and-rule-match-conditions-allow
    try:
    - script:
        timeout: 2m
        content: |
          set -eu
          kubectl -n kyverno port-forward svc/kyverno-svc 9448:443 >/tmp/authorize-match-allow.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID >/dev/null 2>&1 || true' EXIT
          sleep 5
          curl -sk https://127.0.0.1:9448/authz/subjectaccessreview \
            -H 'Content-Type: application/json' \
            --data-binary @- <<'EOF'
          {
            "apiVersion": "authorization.k8s.io/v1",
            "kind": "SubjectAccessReview",
            "spec": {
              "user": "alice",
              "groups": ["developers"],
              "resourceAttributes": {
                "verb": "get",
                "resource": "configmaps",
                "namespace": "authorize-test"
              }
            }
          }
          EOF
        check:
          (contains($stdout, '"allowed":true')): true
          (contains($stdout, 'matched rule')): true

  - name: rule-match-condition-blocks-other-namespace
    try:
    - script:
        timeout: 2m
        content: |
          set -eu
          kubectl -n kyverno port-forward svc/kyverno-svc 9449:443 >/tmp/authorize-match-namespace.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID >/dev/null 2>&1 || true' EXIT
          sleep 5
          curl -sk https://127.0.0.1:9449/authz/subjectaccessreview \
            -H 'Content-Type: application/json' \
            --data-binary @- <<'EOF'
          {
            "apiVersion": "authorization.k8s.io/v1",
            "kind": "SubjectAccessReview",
            "spec": {
              "user": "alice",
              "groups": ["developers"],
              "resourceAttributes": {
                "verb": "get",
                "resource": "configmaps",
                "namespace": "other"
              }
            }
          }
          EOF
        check:
          (contains($stdout, '"allowed":false')): true
          (contains($stdout, 'no policy matched')): true

  - name: policy-match-condition-blocks-non-developers
    try:
    - script:
        timeout: 2m
        content: |
          set -eu
          kubectl -n kyverno port-forward svc/kyverno-svc 9450:443 >/tmp/authorize-match-groups.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID >/dev/null 2>&1 || true' EXIT
          sleep 5
          curl -sk https://127.0.0.1:9450/authz/subjectaccessreview \
            -H 'Content-Type: application/json' \
            --data-binary @- <<'EOF'
          {
            "apiVersion": "authorization.k8s.io/v1",
            "kind": "SubjectAccessReview",
            "spec": {
              "user": "bob",
              "groups": ["qa"],
              "resourceAttributes": {
                "verb": "get",
                "resource": "configmaps",
                "namespace": "authorize-test"
              }
            }
          }
          EOF
        check:
          (contains($stdout, '"allowed":false')): true
          (contains($stdout, 'no policy matched')): true