apiVersion: v1
kind: Pod
metadata:
  name: test-pod
spec:
  volumes:
    - name: extra-config
      configMap:
        name: extra-cm
    - name: extra-cache
      emptyDir:
        sizeLimit: "250Mi"
    - name: data
      configMap:
        name: app-data
    - name: cache
      emptyDir:
        sizeLimit: "250Mi"
