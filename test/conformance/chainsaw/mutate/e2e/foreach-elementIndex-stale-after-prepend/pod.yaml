apiVersion: v1
kind: Pod
metadata:
  name: test-pod
spec:
  automountServiceAccountToken: false
  terminationGracePeriodSeconds: 0
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
  volumes:
    - name: data
      configMap:
        name: app-data
    - name: cache
      emptyDir: {}
