apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: rewrite-image-registry
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      operations: ["CREATE"]
      resources: ["pods"]
  mutations:
  - patchType: ApplyConfiguration
    applyConfiguration:
      expression: |
        Object{
          spec: Object.spec{
            containers: object.spec.containers.map(c, Object.spec.containers{
              name: c.name,
              image: regex.replace(c.image, "^docker\\.io/(.*)", r'myregistry.io/\1')
            })
          }
        }
