apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: conditional-operation-test
policies:
- policy.yaml
resources:
- resource.yaml
results:
- kind: Pod
  policy: deny-create-development-pod
  resourceOperation: CREATE
  resources:
  - dev-app
  result: fail
- kind: Pod
  policy: deny-create-development-pod
  resourceOperation: CREATE
  resources:
  - prod-app
  result: pass
- kind: Pod
  policy: deny-create-production-pod
  resourceOperation: CREATE
  resources:
  - prod-app
  result: fail
- kind: Pod
  policy: deny-create-production-pod
  resourceOperation: CREATE
  resources:
  - dev-app
  result: pass
- kind: Pod
  policy: deny-delete-production-pod
  resourceOperation: DELETE
  resources:
  - prod-app
  result: fail
- kind: Pod
  policy: deny-delete-production-pod
  resourceOperation: DELETE
  resources:
  - dev-app
  result: pass
