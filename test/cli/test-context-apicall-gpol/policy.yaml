apiVersion: policies.kyverno.io/v1beta1
kind: GeneratingPolicy
metadata:
  annotations:
    policies.kyverno.io/description: >-
      Looks up the ComputeClass CRD via resource.get() and generates a
      ConfigMap indicating whether the compute class
      has spot enabled. This tests context-based CRD API call lookups
      for GeneratingPolicy.
    policies.kyverno.io/title: Generate ConfigMap via CRD Lookup
  name: generate-computeclass-config
spec:
  matchConstraints:
    resourceRules:
    - apiGroups: ["apps"]
      apiVersions: ["v1"]
      operations: ["CREATE"]
      resources: ["deployments"]
  variables:
  - name: nodeSelector
    expression: >-
      object.spec.?template.?spec.?nodeSelector.orValue({})
  - name: computeclassname
    expression: >-
      variables.nodeSelector[?'cloud.google.com/compute-class'].orValue('default')
  - name: computeclass
    expression: >-
      resource.get('cloud.google.com/v1', 'computeclasses', '', variables.computeclassname)
  - name: priorities
    expression: "variables.computeclass.?spec.?priorities.orValue([])"
  - name: hasSpot
    expression: >-
      variables.priorities.exists(p, p.?spot.orValue(false) == true)
  - name: classType
    expression: >-
      variables.hasSpot ? 'spot' : 'on-demand'
  - name: generatedConfig
    expression: >-
      [
        {
          "kind": dyn("ConfigMap"),
          "apiVersion": dyn("v1"),
          "metadata": dyn({
            "name": object.metadata.name + "-cc-info",
            "namespace": "test-namespace",
          }),
          "data": dyn({
            "type": variables.classType
          })
        }
      ]
  generate:
    - expression: generator.apply(object.metadata.namespace, variables.generatedConfig)
