apiVersion: policies.kyverno.io/v1beta1
kind: MutatingPolicy
metadata:
  name: add-env-label
spec:
  matchConstraints:
    resourceRules:
    - apiGroups: ["apps"]
      apiVersions: ["v1"]
      operations: ["CREATE"]
      resources: ["deployments"]
  variables:
  - name: envConfig
    expression: >-
      resource.get("v1", "configmaps", object.metadata.namespace, "env-config")
  - name: envValue
    expression: >-
      has(variables.envConfig.data) && 'env' in variables.envConfig.data ? variables.envConfig.data['env'] : 'unknown'
  mutations:
  - patchType: JSONPatch
    jsonPatch:
      expression: |
        [
          JSONPatch{
            op: "add",
            path: "/metadata/labels/environment",
            value: variables.envValue
          }
        ]
