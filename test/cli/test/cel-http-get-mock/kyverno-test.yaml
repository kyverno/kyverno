# CEL ValidatingPolicy with http.Get() — apiCallResponses provides the response for offline test.
apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cel-http-get-mock
policies:
- policy.yaml
resources:
- resources.yaml
apiCallResponses:
  - url: "http://test-api-service.default.svc.cluster.local:80"
    response:
      statusCode: 200
      body:
        metadata:
          labels:
            app: test
results:
- isValidatingPolicy: true
  kind: Pod
  policy: vpol-http-get
  resources:
  - default/good-pod
  result: pass
- isValidatingPolicy: true
  kind: Pod
  policy: vpol-http-get
  resources:
  - default/bad-pod
  result: fail
