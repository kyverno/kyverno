apiVersion: apps/v1
kind: Deployment
metadata:
  name: existing-deployment-1
  namespace: default
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: existing-deployment-2
  namespace: default
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: node
        image: node:18
