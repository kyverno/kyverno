apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kyverno-test
policies:
  - policy.yaml
resources:
  - resources.yaml
# NOTE: CLI tests use mocked globalContextEntries.data and do not exercise the informer-backed
# GlobalContextEntry.spec.kubernetesResource.name lookup. That behavior is covered by unit tests.
globalContextEntries:
  - name: service-registry
    data:
      allowedRegistries:
        - myregistry.io
    projections:
      - name: allowedRegistries
        path: allowedRegistries
results:
  - policy: check-service-registry
    rule: validate-allowed-registries
    kind: Pod
    resources:
      - good-pod
    result: pass
  - policy: check-service-registry
    rule: validate-allowed-registries
    kind: Pod
    resources:
      - bad-pod
    result: fail