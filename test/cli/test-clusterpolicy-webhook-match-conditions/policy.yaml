apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-team-label
spec:
  background: false
  webhookConfiguration:
    matchConditions:
    - name: default-namespace-only
      expression: object.metadata.namespace == "default"
  rules:
  - name: require-team-label
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      failureAction: Audit
      message: team label is required
      pattern:
        metadata:
          labels:
            team: platform
