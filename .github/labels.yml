# Combined GitHub label definitions for Kyverno.
# The document root is a mapping: each key is a GitHub label name; each value has
# color, description, and optional rules (PR path matchers for actions/labeler).

##############################################################################
# Area labels — based on which part of the codebase a PR touches
##############################################################################

# ── Area: Core Engine (deep blue #0052cc) ────────────────────────────────────
# ── API & CRDs ──────────────────────────────────────────────────────────────
area/api:
  color: 1d76db
  description: API type definitions
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - api/**

area/crds:
  color: 1d76db
  description: CRD manifests
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - config/crds/**

# ── Policy Engine ───────────────────────────────────────────────────────────
area/engine:
  color: 0052cc
  description: Policy engine core
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - pkg/engine/**

area/validation:
  color: 0052cc
  description: Validation logic
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - pkg/engine/validate/**
            - pkg/engine/validation.go
            - pkg/engine/validation_test.go
            - pkg/validation/**

area/mutation:
  color: 0052cc
  description: Mutation logic
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - pkg/engine/mutate/**
            - pkg/engine/mutation.go
            - pkg/engine/mutation_test.go
            - pkg/engine/forceMutate.go
            - pkg/engine/forceMutate_test.go

area/generation:
  color: 0052cc
  description: Generation / background rules
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - pkg/engine/generation.go
            - pkg/background/**

# ── Area: Image Verification (indigo #3F51B5) ───────────────────────────────
area/image-verify:
  color: 3F51B5
  description: Image verification
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - pkg/engine/image_verify.go
            - pkg/engine/image_verify_test.go
            - pkg/imageverification/**
            - pkg/imageverifycache/**
            - pkg/images/**

area/cosign:
  color: 3F51B5
  description: Cosign integration
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - pkg/cosign/**

area/notary:
  color: 3F51B5
  description: Notary integration
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - pkg/notary/**

