##############################################################################
# Kind labels — what type of artifact is being changed
##############################################################################

# ── Kind: Helm (purple #7B1FA2) ─────────────────────────────────────────────
kind/helm:
  color: 7B1FA2
  description: Helm charts
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - charts/**

kind/helm-kyverno:
  color: 7B1FA2
  description: Kyverno Helm chart
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - charts/kyverno/**

kind/helm-policies:
  color: 7B1FA2
  description: Kyverno-policies Helm chart
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - charts/kyverno-policies/**

# ── Kind: Tests (magenta #D81B60) ───────────────────────────────────────────
kind/tests:
  color: D81B60
  description: Unit / integration tests
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - test/**
            - '**/*_test.go'
            - pkg/**/fuzz_test.go

kind/e2e-tests:
  color: D81B60
  description: E2E / Chainsaw tests
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - test/chainsaw/**
            - test/conformance/**
            - config/e2e/**

kind/cli-tests:
  color: D81B60
  description: CLI tests
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - test/cli/**

# ── Kind: Docs (light purple #CE93D8) ───────────────────────────────────────
kind/documentation:
  color: CE93D8
  description: Documentation changes
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - docs/**
            - '**/*.md'
            - ADOPTERS.md
            - CHANGELOG.md
            - CODE_OF_CONDUCT.md
            - CONTRIBUTING.md
            - CONTRIBUTORS.md
            - DEVELOPMENT.md
            - GOVERNANCE.md
            - LICENSE
            - MAINTAINERS.md
            - OWNERS.md
            - README.md
            - ROADMAP.md
            - SECURITY.md
            - Kyverno_Architecture_Roadmap.md

# ── Kind: CI & Build (dark magenta #8E24AA) ─────────────────────────────────
kind/ci:
  color: 8E24AA
  description: CI / GitHub Actions
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - .github/**
            - Makefile
            - codecov.yml
            - sonar-project.properties

kind/codegen:
  color: 8E24AA
  description: Code generation / scripts
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - hack/**
            - scripts/**
            - cmd/tools/**

# ── Kind: Dependencies (brown #795548) ──────────────────────────────────────
kind/dependencies:
  color: "795548"
  description: go.mod / go.sum changes
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - go.mod
            - go.sum

# ── Kind: Security (dark red #B71C1C) ───────────────────────────────────────
kind/security:
  color: B71C1C
  description: Security-related changes
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - SECURITY.md
            - SECURITY-INSIGHTS.yml

# ── Kind: Config (plum #6A1B9A) ─────────────────────────────────────────────
kind/config:
  color: 6A1B9A
  description: Config manifests (non-CRD)
  rules:
    - changed-files:
        - any-glob-to-any-file:
            - config/**

# ── Special ──────────────────────────────────────────────────────────────────
spam:
  color: e11d48
  description: Suspected spam / PR burst

merge-conflicts:
  color: E65100
  description: PR has merge conflicts
