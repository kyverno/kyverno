# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

name: Install Go
description: Install Go

inputs:
  go-version-file:
    description: Go version file
    default: go.mod

outputs:
  gomod-cache:
    description: Go module cache path (GOMODCACHE)
    value: ${{ steps.variables.outputs.GO_MOD_CACHE }}
  gobuild-cache:
    description: Go build cache path (GOCACHE)
    value: ${{ steps.variables.outputs.GO_BUILD_CACHE }}

runs:
  using: composite
  steps:
    - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: false
    - id: variables
      shell: bash
      run: |
        set -e
        echo "GO_MOD_CACHE=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT
        echo "GO_BUILD_CACHE=$(go env GOCACHE)" >> $GITHUB_OUTPUT
