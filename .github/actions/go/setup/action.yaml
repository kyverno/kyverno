# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

name: Setup Go
description: Setup Go

inputs:
  go-version-file:
    description: Go version file
    default: go.mod
  restore-mod-cache:
    description: Restore Go module cache
    default: 'true'
  restore-build-cache:
    description: Restore Go build cache
    default: 'true'

runs:
  using: composite
  steps:
    - uses: ./.github/actions/go/install
      with:
        go-version-file: ${{ inputs.go-version-file }}
    - id: variables
      shell: bash
      run: |
        set -e
        echo "GO_MOD_CACHE=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT
        echo "GO_BUILD_CACHE=$(go env GOCACHE)" >> $GITHUB_OUTPUT
    - if: inputs.restore-mod-cache != 'false'
      uses: ./.github/actions/go/restore-cache
      with:
        path: ${{ steps.variables.outputs.GO_MOD_CACHE }}
        cache-prefix: gomod
    - if: inputs.restore-build-cache != 'false'
      uses: ./.github/actions/go/restore-cache
      with:
        path: ${{ steps.variables.outputs.GO_BUILD_CACHE }}
        cache-prefix: gobuild
