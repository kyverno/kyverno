# yaml-language-server: $schema=https://json.schemastore.org/github-action.json

name: Lookup Go cache
description: Check whether a Go cache exists without restoring it

inputs:
  path:
    description: Cache path (used for key only; not restored)
    required: true
  cache-prefix:
    description: Prefix for cache key
    required: true

outputs:
  cache-hit:
    description: Whether an exact cache key match was found
    value: ${{ steps.lookup.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - id: variables
      shell: bash
      run: |
        set -e
        echo "GOVERSION=$(go env GOVERSION)" >> $GITHUB_OUTPUT
        echo "CACHEDATE=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
        echo "ARCH=$(echo '${{ runner.arch }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
        echo "OS=${ImageOS:-Unknown}" >> $GITHUB_OUTPUT
    - id: lookup
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ${{ inputs.path }}
        key: ${{ inputs.cache-prefix }}-${{ runner.os }}-${{ steps.variables.outputs.ARCH }}-${{ steps.variables.outputs.OS }}-${{ steps.variables.outputs.GOVERSION }}-${{ steps.variables.outputs.CACHEDATE }}-${{ hashFiles('**/go.sum') }}
        lookup-only: true
