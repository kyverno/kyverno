name: K6 tests

permissions: {}

on:
  workflow_call: {}

jobs:
  k6:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [simple, kyverno, kyverno-pss]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: ./.github/actions/go/setup
      - name: Install helm
        uses: ./.github/actions/tools/helm
      - name: Install kind
        uses: ./.github/actions/tools/kind
      - name: Install k6
        uses: ./.github/actions/tools/k6
      - name: Create cluster
        uses: ./.github/actions/perf-test/cluster
      - if: matrix.scenario != 'simple'
        name: Download kyverno images archive from build workflow
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kyverno.tar
      - if: matrix.scenario != 'simple'
        name: Deploy kyverno
        shell: bash
        run: |
          set -e
          kind load image-archive kyverno.tar --name kind
          USE_CONFIG=standard,service-monitor make kind-install-kyverno
      - if: matrix.scenario == 'kyverno-pss'
        name: Deploy policies
        shell: bash
        run: |
          helm upgrade --install --wait --timeout 15m \
            --namespace kyverno --create-namespace \
            --repo https://kyverno.github.io/kyverno/ \
            kyverno-policies kyverno-policies
      - name: Create test namespace
        shell: bash
        run: kubectl create ns testns
      - name: Expose prometheus
        shell: bash
        run: kubectl port-forward -n monitoring svc/kube-prometheus-stack-prometheus 9090:9090 &
      - name: Run test
        shell: bash
        run: |
          K6_WEB_DASHBOARD_PERIOD=5s \
          K6_WEB_DASHBOARD_EXPORT=k6.html \
          K6_PROMETHEUS_RW_TREND_STATS="avg,min,med,max,p(90),p(95),p(99)" \
          k6 run \
            --vus 100 --iterations 1000 \
            --no-connection-reuse \
            --no-vu-connection-reuse \
            --no-usage-report \
            --quiet \
            --summary-mode full --summary-export k6-summary.json --summary-trend-stats "avg,min,med,max,p(90),p(95),p(99)" \
            --new-machine-readable-summary \
            --out web-dashboard \
            --out experimental-prometheus-rw=http://localhost:9090/api/v1/write \
            --out json=k6.json \
            ./scripts/k6/script.js
      - name: etcd storage report
        shell: bash
        run: |
          sleep 1m
          ./scripts/etcd-storage-report.sh http://localhost:9090
      - name: Kyverno pods CPU/memory report
        shell: bash
        run: |
          ./scripts/kyverno-pods-resources-report.sh http://localhost:9090
      - name: Upload k6 reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: k6-reports-${{ matrix.scenario }}
          path: |
            k6-summary.json
            k6.html
            k6.json
            etcd-storage-report.json
            kyverno-pods-resources-report.json

  summary:
    runs-on: ubuntu-latest
    needs:
      - k6
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download k6 reports (simple)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: k6-reports-simple
          path: summaries/simple
        continue-on-error: true
      - name: Download k6 reports (kyverno)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: k6-reports-kyverno
          path: summaries/kyverno
        continue-on-error: true
      - name: Download k6 reports (kyverno-pss)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: k6-reports-kyverno-pss
          path: summaries/kyverno-pss
        continue-on-error: true
      - name: Aggregate and compare results
        run: |
          ./scripts/k6-aggregate-summary.sh summaries simple kyverno kyverno-pss >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ./scripts/etcd-aggregate-summary.sh summaries simple kyverno kyverno-pss >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ./scripts/kyverno-pods-resources-aggregate-summary.sh summaries simple kyverno kyverno-pss >> $GITHUB_STEP_SUMMARY
