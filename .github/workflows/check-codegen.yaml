# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Codegen

permissions: {}

on:
  pull_request:
    branches:
      - main
      - release-*
  push:
    branches:
      - main
      - release-*

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify-codegen-code:
    name: Verify codegen (code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: ./.github/actions/go/setup
      - name: Generate code
        run: make codegen-all-code
      - name: Verify codegen is up to date
        run: make verify-codegen
      - name: Create codegen patch
        if: failure()
        run: |
          git diff > codegen-code.patch
          echo 'Codegen is out of date. Download the codegen-code-patch artifact, then run `git apply codegen-code.patch` and commit the result.' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload codegen patch
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codegen-code-patch
          path: codegen-code.patch

  verify-codegen-docs:
    name: Verify codegen (docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: ./.github/actions/go/setup
      - name: Generate api docs
        run: make codegen-all-docs
      - name: Verify codegen is up to date
        run: make verify-codegen
      - name: Create codegen patch
        if: failure()
        run: |
          git diff > codegen-docs.patch
          echo 'Codegen is out of date. Download the codegen-docs-patch artifact, then run `git apply codegen-docs.patch` and commit the result.' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload codegen patch
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codegen-docs-patch
          path: codegen-docs.patch

  sync-issue:
    if: always() && github.event_name == 'push'
    needs:
      - verify-codegen-code
      - verify-codegen-docs
    permissions:
      issues: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Sync issue
        uses: ./.github/actions/workflow/failure-issue
        with:
          conclusion: ${{ contains(needs.*.result, 'failure') && 'failure' || job.status }}
          needs: ${{ toJSON(needs) }}
