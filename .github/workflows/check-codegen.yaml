# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Codegen

permissions: {}

on:
  pull_request:
    branches:
      - main
      - release-*
  push:
    branches:
      - main
      - release-*

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify-codegen-code:
    name: Verify codegen (code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: ./.github/actions/go/setup
      - name: Generate code
        run: make codegen-all-code
      - name: Verify codegen is up to date
        run: make verify-codegen

  verify-codegen-docs:
    name: Verify codegen (docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: ./.github/actions/go/setup
      - name: Generate api docs
        run: make codegen-all-docs
      - name: Verify codegen is up to date
        run: make verify-codegen

  sync-issue:
    if: always() && github.event_name == 'push'
    needs:
      - verify-codegen-code
      - verify-codegen-docs
    permissions:
      issues: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Sync issue
        uses: ./.github/actions/workflow/failure-issue
