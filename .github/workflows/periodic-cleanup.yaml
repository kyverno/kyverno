name: Cleanup

permissions: {}

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *" # This schedule runs the workflow at midnight every day

jobs:
  stale-branches:
    name: Cleanup stale branches
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Cleanup Stale Branches
        uses: cbrgm/cleanup-stale-branches-action@4f003bd7643a6f8d1034b2e9c51015fd23c88c0b # v1.2.11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          allowed-prefixes: "dependabot/,temp-cherry-pick-,cherry-pick-"
          last-commit-age-days: 7
          dry-run: false
          rate-limit: true

  sync-issue:
    if: always() && github.event_name == 'push'
    needs:
      - stale-branches
    permissions:
      issues: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Sync issue
        uses: ./.github/actions/workflow/failure-issue
        with:
          conclusion: ${{ contains(needs.*.result, 'failure') && 'failure' || job.status }}
          needs: ${{ toJSON(needs) }}
