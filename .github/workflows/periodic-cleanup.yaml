name: Cleanup

permissions: {}

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *" # This schedule runs the workflow at midnight every day

jobs:
  stale-branches:
    name: Cleanup stale branches
    runs-on: ubuntu-slim
    steps:
      - name: Cleanup Stale Branches
        uses: cbrgm/cleanup-stale-branches-action@c6bf15e293f579173a40a90f063c5133461784d0 # v1.2.7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          allowed-prefixes: "dependabot/,temp-cherry-pick-,cherry-pick-"
          last-commit-age-days: 7
          dry-run: false
          rate-limit: true

  sync-issue:
    if: always() && github.event_name == 'push'
    needs:
      - stale-branches
    permissions:
      issues: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Sync issue
        uses: ./.github/actions/workflow/failure-issue
