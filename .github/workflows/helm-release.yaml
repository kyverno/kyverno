# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: helm-release

permissions: {}

concurrency:
  group: helm-gh-pages-${{ github.repository }}
  cancel-in-progress: false

on:
  push:
    tags:
      - kyverno-chart-v*
      - kyverno-policies-chart-v*
      - kyverno-chart-*
      - kyverno-policies-chart-*
  workflow_dispatch:
    inputs:
      chart:
        description: 'Chart to release (kyverno or kyverno-policies)'
        required: true
        type: choice
        options:
          - kyverno
          - kyverno-policies
      version:
        description: 'Chart version (e.g. 3.8.1)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (tag or branch, e.g. kyverno-policies-chart-3.8.1)'
        required: true
        type: string

jobs:
  helm-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13.1
      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: Add Helm repos and build dependencies
        run: |
          helm repo add openreports https://openreports.github.io/reports-api
          helm repo add reports-server https://kyverno.github.io/reports-server
          helm repo add kyverno-api https://kyverno.github.io/api
          helm repo update
      - name: Run chart-testing (lint)
        run: ct lint --target-branch=main --check-version-increment=false --validate-maintainers=false

  linter-artifacthub:
    runs-on: ubuntu-latest
    container:
      image: artifacthub/ah
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Run ah lint
        working-directory: ./charts/
        run: ah lint

  create-release:
    runs-on: ubuntu-latest
    needs: helm-tests
    permissions:
      contents: write
      packages: write
      id-token: write 
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Install tools
        uses: ./.github/actions/tools/install
        with:
          helm: true
          cosign: true
      - name: Set version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.chart }}" == "kyverno-policies" ]]; then
              echo "RELEASE_VERSION=kyverno-policies-chart-${{ inputs.version }}" >> $GITHUB_ENV
            else
              echo "RELEASE_VERSION=kyverno-chart-${{ inputs.version }}" >> $GITHUB_ENV
            fi
          else
            echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          fi
      - name: Create charts tmp directory
        run: |
          mkdir charts-tmp
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            cp -a charts/${{ inputs.chart }} charts-tmp/${{ inputs.chart }}
          elif [[ "$RELEASE_VERSION" = "kyverno-policies-chart-v"* ]] || [[ "$RELEASE_VERSION" = "kyverno-policies-chart-"* ]]; then
            cp -a charts/kyverno-policies charts-tmp/kyverno-policies
          elif [[ "$RELEASE_VERSION" = "kyverno-chart-v"* ]] || [[ "$RELEASE_VERSION" = "kyverno-chart-"* ]]; then
            cp -a charts/kyverno charts-tmp/kyverno
          else
            echo "Unknown release version: $RELEASE_VERSION"
            exit 1
          fi
      - name: Run chart-releaser
        uses: stefanprodan/helm-gh-pages@0ad2bb377311d61ac04ad9eb6f252fb68e207260 #v1.7.0
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          linting: off
          charts_dir: charts-tmp
      - name: Login to GitHub Container Registry
        run: |
          helm registry login --username ${GITHUB_ACTOR} --password ${{ secrets.GITHUB_TOKEN }} ghcr.io
      - name: Publish OCI Charts
        env:
          COSIGN_REPOSITORY: ghcr.io/${{ github.repository_owner }}/signatures
        run: |
          for dir in `find charts-tmp -maxdepth 1 -mindepth 1 -type d -print`; do
            chart=${dir##*/}
            echo "Found chart: ${chart}"
            helm package charts-tmp/${chart} --destination .dist
            helm push .dist/${chart}-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts |& tee .digest
            cosign login --username ${GITHUB_ACTOR} --password ${{ secrets.GITHUB_TOKEN }} ghcr.io
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              -a "kind=helm-chart" \
              ghcr.io/${{ github.repository_owner }}/charts/${chart}@$(cat .digest | awk -F "[, ]+" '/Digest/{print $NF}')
          done
