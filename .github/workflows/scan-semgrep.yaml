# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Semgrep

permissions: {}

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 4 * * *' # daily at 04:30 UTC

concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: Semgrep analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.168.0@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run Semgrep
        shell: bash
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/golang \
            --severity=ERROR \
            --sarif \
            --output=semgrep.sarif \
            --no-error \
            --metrics=off
      - name: Upload Semgrep scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  sync-issue:
    if: always() && github.event_name == 'schedule'
    needs:
      - analysis
    permissions:
      issues: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Sync issue
        uses: ./.github/actions/workflow/failure-issue
        with:
          conclusion: ${{ contains(needs.*.result, 'failure') && 'failure' || job.status }}
          needs: ${{ toJSON(needs) }}
