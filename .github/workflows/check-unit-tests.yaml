# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Unit tests

permissions: {}

on:
  pull_request:
    branches:
      - main
      - release-*
  push:
    branches:
      - main
      - release-*

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        android: true
        docker-images: false
        dotnet: false
        haskell: false
        large-packages: false
        swap-storage: false
        tool-cache: false
    - name: Setup Go
      id: setup-go
      uses: ./.github/actions/go/setup
      with:
        gobuild-cache-prefix: gobuild-unit-tests
    - name: Unit test
      run: make test-unit
    - name: Save gobuild cache
      if: |
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main'
      uses: ./.github/actions/go/save-cache
      with:
        path: ${{ steps.setup-go.outputs.gobuild-cache }}
        cache-prefix: gobuild-unit-tests
    - name: Upload coverage
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: coverage.out
        path: coverage.out
        retention-days: 1
        if-no-files-found: error

  upload-to-codecov:
    name: Upload coverage to Codecov
    needs:
    - tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Download coverage
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: coverage.out
    - name: Upload Report to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
      with:
        files: ./coverage.out
        fail_ci_if_error: true
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  issue-sync:
    needs:
      - tests
      - upload-to-codecov
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-slim
    steps:
      - name: Sync issue
        uses: ./.github/actions/workflow/failure-issue
