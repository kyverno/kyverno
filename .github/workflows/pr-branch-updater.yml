name: PR Branch Auto-Updater

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-branch-updater
  cancel-in-progress: false

jobs:
  update:
    uses: kyverno/.github/.github/workflows/pr-branch-updater.yml@36a967326e724e5e5fe6c93d7f45d6c1a3436301
    secrets:
      # GitHub App credentials for the PR branch updater app/installation used by this
      # reusable workflow. When rotating these secrets, keep the app installation and
      # required permissions aligned with the workflow's needs (including workflow,
      # contents, and pull request write access).
      APP_CLIENT_ID: ${{ secrets.PR_UPDATER_APP_CLIENT_ID }}
      APP_PRIVATE_KEY: ${{ secrets.PR_UPDATER_APP_PRIVATE_KEY }}
