# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Trivy

permissions: {}

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - release-*

concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: Trivy analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/go/setup
      - name: Build all
        shell: bash
        run: |
          set -e
          make build-all
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: rootfs
          scan-ref: ./cmd/kyverno/kyverno
          format: sarif
          output: kyverno.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          ignore-policy: .trivyignore.rego
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: kyverno.sarif
          category: kyverno

  sync-issue:
    if: always() && github.event_name == 'push'
    needs:
      - analysis
    permissions:
      issues: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Sync issue
        uses: ./.github/actions/workflow/failure-issue
        with:
          conclusion: ${{ contains(needs.*.result, 'failure') && 'failure' || job.status }}
          needs: ${{ toJSON(needs) }}
